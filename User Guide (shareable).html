document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  .pageno { position: absolute; bottom: 6mm; right: 14mm; font: 600 9px 'Public Sans'; color: #b3b0a4; letter-spacing: .08em; }\n\n  .lead { font-size: 11.4px; line-height: 1.44; color: #3a4654; margin: 6px 0 8px; }\n\n  .sec-title { font: 700 10px 'Public Sans'; letter-spacing: .1em; text-transform: uppercase; color: #1f7a6e; margin: 2px 0 4px; }\n\n  .cols { display: grid; grid-template-columns: 1.32fr 1fr; gap: 16px; }\n  .stepnum { display: inline-flex; align-items: center; justify-content: center; width: 21px; height: 21px; border-radius: 50%; background: #15375c; color: #fff; font: 700 11px 'Public Sans'; flex-shrink: 0; }\n  .step { display: flex; gap: 9px; margin-bottom: 6px; }\n  .step h3 { font: 700 12.5px 'Public Sans'; color: #0c2340; margin-bottom: 2px; }\n  .step p { font-size: 10.4px; line-height: 1.42; color: #46525f; }\n  .step b { color: #1c2b3a; }\n\n  .card { background: #faf7ef; border: 1px solid #ece6d8; border-radius: 9px; padding: 8px 11px; margin-bottom: 6px; }\n  .card h4 { font: 700 11.5px 'Public Sans'; color: #15375c; margin-bottom: 3px; }\n  .card p { font-size: 10.2px; line-height: 1.45; color: #5a6472; }\n\n  /* readiness layers */\n  .layer { display: flex; gap: 11px; border: 1px solid #e4ddcd; border-radius: 11px; padding: 6px 12px; margin-bottom: 3px; background: #fffdf8; }\n  .layer .rail { flex-shrink: 0; width: 30px; display: flex; flex-direction: column; align-items: center; gap: 6px; }\n  .layer .ring { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font: 700 14px 'Lora', serif; color: #fff; }\n  .layer .body { flex: 1; }\n  .layer h3 { font: 700 13px 'Public Sans'; color: #0c2340; margin-bottom: 2px; }\n  .layer .form { font: 600 11.5px ui-monospace, 'SF Mono', Menlo, monospace; color: #15375c; background: #f1ece1; border-radius: 6px; padding: 3px 9px; display: inline-block; margin: 2px 0 3px; white-space: nowrap; }\n  .layer p { font-size: 10.1px; line-height: 1.38; color: #46525f; }\n  .layer p + p { margin-top: 4px; }\n  .layer .eg { font-size: 9.6px; color: #6a7686; background: #f7f4ec; border-left: 3px solid #cbc4b2; padding: 4px 9px; border-radius: 0 6px 6px 0; margin-top: 4px; line-height: 1.38; }\n  .layer b { color: #1c2b3a; }\n\n  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }\n  .subcard { background: #f7f4ec; border: 1px solid #e8e1d1; border-radius: 8px; padding: 9px 11px; }\n  .subcard .t { font: 700 10.5px 'Public Sans'; color: #1f7a6e; margin-bottom: 3px; }\n  .subcard .form { font: 600 10.5px ui-monospace, 'SF Mono', Menlo, monospace; color: #15375c; display: block; margin-bottom: 4px; }\n  .subcard p { font-size: 9.6px; line-height: 1.4; color: #5a6472; }\n\n  .callout { background: #0c2340; border-radius: 10px; padding: 8px 13px; color: #eaf0f8; margin: 2px 0 0; }\n  .callout .sec-title { color: #9fd6c0; margin-top: 0; }\n  .callout .fm { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n  .callout .fm b { color: #ffd9a0; font: 700 10.5px 'Public Sans'; }\n  .callout .fm p { font-size: 10px; line-height: 1.45; color: #c4d2e2; margin-top: 2px; }\n\n  .whytab { width: 100%; border-collapse: collapse; margin-top: 2px; }\n  .whytab th, .whytab td { text-align: left; font-size: 10.2px; padding: 4px 8px; border-bottom: 1px solid #ece6d8; }\n  .whytab th { font: 700 9px 'Public Sans'; letter-spacing: .06em; text-transform: uppercase; color: #8a8576; }\n  .whytab td.m { font: 700 11px 'Public Sans'; color: #1f7a6e; white-space: nowrap; }\n  .whytab td b { color: #1c2b3a; }\n  .callout .whytab td b { color: #ffd9a0; }\n  .callout .whytab td, .callout .whytab th { border-bottom-color: rgba(255,255,255,.14); color: #dbe5f0; }\n  .callout .whytab th { color: #9fd6c0; }\n  .callout .whytab td.m { color: #9fd6c0; }\n\n  /* asset growth */\n  .assets { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }\n  .acard { border: 1px solid #e4ddcd; border-radius: 9px; padding: 10px 12px; background: #fffdf8; }\n  .acard .top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }\n  .acard .chip { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }\n  .acard h4 { font: 700 12px 'Public Sans'; color: #0c2340; }\n  .acard p { font-size: 10.2px; line-height: 1.48; color: #4c5866; }\n  .acard .form { font: 600 9.8px ui-monospace, 'SF Mono', Menlo, monospace; color: #1f7a6e; background: #eef6f3; border-radius: 5px; padding: 3px 7px; display: inline-block; margin-top: 5px; }\n  .acard b { color: #1c2b3a; }\n\n  .flow { background: #0c2340; border-radius: 10px; padding: 12px 15px; color: #eaf0f8; margin: 4px 0 13px; }\n  .flow .sec-title { color: #9fd6c0; margin-top: 0; }\n  .flow-row { display: flex; gap: 10px; align-items: stretch; }\n  .flow-box { flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 7px; padding: 9px 10px; }\n  .flow-box .t { font: 700 10px 'Public Sans'; letter-spacing: .04em; margin-bottom: 3px; }\n  .flow-box p { font-size: 9.6px; line-height: 1.4; color: #c4d2e2; }\n  .arrow { align-self: center; color: #6f86a6; font-size: 15px; }\n\n  .foot { border-top: 1px solid #e2dccd; margin-top: 6px; padding-top: 9px; display: flex; gap: 14px; }\n  .foot .ass { flex: 1; }\n  .foot h5 { font: 700 9px 'Public Sans'; letter-spacing: .09em; text-transform: uppercase; color: #b9822f; margin-bottom: 4px; }\n  .foot p { font-size: 9.2px; line-height: 1.48; color: #7a8290; }\n  .disc { font-size: 9.2px; color: #9aa0aa; font-style: italic; line-height: 1.45; }\n\n  @media print {\n    html, body { background: #fff; }\n    .page { margin: 0; box-shadow: none; width: auto; min-height: auto; break-after: page; }\n    .page:last-of-type { break-after: auto; }\n    @page { size: A4 portrait; margin: 0; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- ===================== PAGE 1 ===================== -->\n  <div class=\"page\">\n\n    <div class=\"head\">\n      <div>\n        <h1>Wealth Forecast &amp; Readiness<\u002Fh1>\n        <div class=\"sub\">Quick-start guide — how the forecast works and how it decides you're ready to retire.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"badge\">Start here<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"lead\">This tool projects your wealth from today to age 100 and tests whether you can retire — including <b>early<\u002Fb>, before super unlocks. Everything updates live as you type. Work left-to-right: <b>Your Plan → Your Assets → read the results.<\u002Fb> This guide explains the two things people ask most: <b>how each asset grows<\u002Fb> (page&nbsp;2) and <b>how \"retirement ready\" is decided<\u002Fb> (below).<\u002Fp>\n\n    <div class=\"cols\">\n      <div>\n        <div class=\"sec-title\">How to use it — 3 steps<\u002Fdiv>\n        <div class=\"step\">\n          <span class=\"stepnum\">1<\u002Fspan>\n          <div>\n            <h3>Fill in \"Your Plan\"<\u002Fh3>\n            <p>Age now, the age you want to <b>retire<\u002Fb>, your <b>preservation age<\u002Fb> (when super unlocks — usually 60), and your <b>annual spending<\u002Fb> in <span class=\"hl\">today's dollars<\u002Fspan>. The readiness target is derived automatically as <b>34× spending<\u002Fb>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <span class=\"stepnum\">2<\u002Fspan>\n          <div>\n            <h3>Add \"Your Assets\"<\u002Fh3>\n            <p>Add what you own — <b>super<\u002Fb>, <b>UniSuper Defined Benefit<\u002Fb>, <b>shares<\u002Fb>, <b>cash<\u002Fb>, <b>investment property<\u002Fb>, and your <b>home<\u002Fb>. For each: balance, expected return, and (where relevant) contributions or loan + repayments.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\">\n          <span class=\"stepnum\">3<\u002Fspan>\n          <div>\n            <h3>Read your results<\u002Fh3>\n            <p>The readiness cards tell you if you're on track (green ✓). The <b>Wealth Trajectory<\u002Fb> chart shows the whole arc; the <b>Accumulation<\u002Fb> and <b>Decumulation<\u002Fb> tables show, year by year, what you hold and what you draw.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"sec-title\">The core idea<\u002Fdiv>\n        <div class=\"card\">\n          <h4>Retiring early has two problems<\u002Fh4>\n          <p>You can be <i>wealthy enough<\u002Fi> yet still fail early retirement on <b>liquidity<\u002Fb>. So the model asks two separate questions: <b>(1)<\u002Fb> is there enough wealth overall, and <b>(2)<\u002Fb> can you access enough of it <i>before<\u002Fi> super becomes available?<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <h4>Why the home is excluded<\u002Fh4>\n          <p>Your home earns no income unless you downsize or borrow against it — it's a lifestyle asset, not a retirement-funding asset. It sits outside the nest-egg tests (but its refinance capacity helps the bridge).<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sec-title\" style=\"margin-top:6px\">The readiness test — three questions<\u002Fdiv>\n    <p style=\"font-size:10.4px;line-height:1.42;color:#3a4654;margin-bottom:5px\">You're <b class=\"navy\">retirement ready<\u002Fb> when both permanent checks (① &amp; ②) pass <b>and<\u002Fb> you clear the bridge (③) by either route. Everything is measured in <span class=\"hl\">today's dollars<\u002Fspan>, at the first age you qualify, so figures line up directly with the targets.<\u002Fp>\n\n    <div class=\"layer\">\n      <div class=\"rail\"><div class=\"ring\" style=\"background:#15375c\">1<\u002Fdiv><\u002Fdiv>\n      <div class=\"body\">\n        <h3>Big-enough nest egg — the <span class=\"teal\">34×<\u002Fspan> rule<\u002Fh3>\n        <span class=\"form\">Super + Shares + Cash&nbsp; ≥&nbsp; 34 × Spending<\u002Fspan>\n        <p>The classic financial-independence number. <b>34× ≈ a 2.9% withdrawal rate<\u002Fb> (1 ÷ 34), deliberately more conservative than the well-known \"4% rule\" (25×) — because an early-retirement portfolio may need to last 40–50 years, and a lower draw leaves more safety margin. It answers: <i>\"if I stopped working permanently, do my productive assets fund my lifestyle?\"<\u002Fi><\u002Fp>\n        <div class=\"eg\"><b>Example —<\u002Fb> $60k spending → target = 60,000 × 34 = <b>$2.04m<\u002Fb> in investable assets (home not counted).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layer\">\n      <div class=\"rail\"><div class=\"ring\" style=\"background:#1f7a6e\">2<\u002Fdiv><\u002Fdiv>\n      <div class=\"body\">\n        <h3>Growth engine — the <span class=\"teal\">27×<\u002Fspan> rule<\u002Fh3>\n        <span class=\"form\">Shares + Super&nbsp; ≥&nbsp; 27 × Spending<\u002Fspan>\n        <p>Cash alone can't sustain a long retirement — inflation erodes it. Enough of your money must stay <b>invested<\u002Fb>. 27× ≈ a 3.7% capacity from growth assets. The gap between 34× and 27× is intentional: <b>34× tests sustainability, 27× tests that the portfolio keeps growing.<\u002Fb><\u002Fp>\n        <div class=\"eg\"><b>Why two checks —<\u002Fb> $2m cash + $1m shares/super <i>passes<\u002Fi> ① but <i>fails<\u002Fi> ②: too much dead capital. $1.5m shares/super + $100k cash may pass ② but fail ①: too little wealth. The pair guards against both failure modes.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layer\">\n      <div class=\"rail\"><div class=\"ring\" style=\"background:#b9822f\">3<\u002Fdiv><\u002Fdiv>\n      <div class=\"body\">\n        <h3>Bridge to preservation — surviving until super unlocks<\u002Fh3>\n        <p style=\"margin-bottom:6px\">If you retire at 52 and super unlocks at 60, there are <b class=\"mono\">x = 8<\u002Fb> years where super exists but you can't touch it. You must fund that gap from accessible money, plus a <b>security buffer<\u002Fb> (extra years you set in Your Plan). Pass <b>either<\u002Fb> route (<b class=\"mono\">x<\u002Fb> = years to preservation; <b>Cash Bucket<\u002Fb> = cash + 80%-LVR home refinance):<\u002Fp>\n        <div class=\"split\">\n          <div class=\"subcard\">\n            <div class=\"t\">③ⓐ &nbsp;Split<\u002Fdiv>\n            <span class=\"form\">Shares ≥ 27 · x/(x+40)<br>and Cash Bucket ≥ 7×<\u002Fspan>\n            <p>A two-stage portfolio: cash + home equity + some shares cover the bridge, then super takes over. The <span class=\"mono\">x/(x+40)<\u002Fspan> term is an early-retirement penalty — retire earlier, hold more liquid assets. <b>Retire at 52:<\u002Fb> 8/48 = 17% → shares ≥ 4.5× spending. <b>Retire at 59:<\u002Fb> 1/41 = 2.4% → barely any bridge.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"subcard\">\n            <div class=\"t\">③ⓑ &nbsp;Bridge bucket<\u002Fdiv>\n            <span class=\"form\">Shares + Cash Bucket ≥ (x+buffer)×<\u002Fspan>\n            <p>The simpler alternative: ignore portfolio design, just prove you hold enough accessible money to survive to super — plus a <b>security buffer<\u002Fb> (extra years, set in Your Plan). <b>Retire at 52, 2-yr buffer, $60k spend:<\u002Fb> need (8+2) × 60k = $600k. $350k shares + $250k cash → passes.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"eg\"><b>After preservation age, x = 0<\u002Fb> — the bridge clears automatically, so readiness is simply ① + ②.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"sec-title\">In one line each<\u002Fdiv>\n      <table class=\"whytab\">\n        <tbody><tr><th style=\"width:64px\">Layer<\u002Fth><th>Question it answers<\u002Fth><\u002Ftr>\n        <tr><td class=\"m\">① 34×<\u002Ftd><td>Can I afford retirement <b>forever<\u002Fb>?<\u002Ftd><\u002Ftr>\n        <tr><td class=\"m\">② 27×<\u002Ftd><td>Will my assets <b>keep growing<\u002Fb>?<\u002Ftd><\u002Ftr>\n        <tr><td class=\"m\">③ Bridge<\u002Ftd><td>Can I <b>survive before super unlocks<\u002Fb>?<\u002Ftd><\u002Ftr>\n      <\u002Ftbody><\u002Ftable>\n      <p style=\"font-size:9.6px;line-height:1.42;color:#c4d2e2;margin-top:6px\">Together they avoid the classic Australian-FIRE mistake of treating super as either <i>fully available<\u002Fi> (too optimistic) or <i>irrelevant<\u002Fi> (too conservative). Super is a powerful engine — early retirees just need a temporary bridge to reach it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pageno\">Page 1 of 2 · Readiness<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== PAGE 2 ===================== -->\n  <div class=\"page\">\n\n    <div class=\"head\">\n      <div>\n        <h1>How each asset grows<\u002Fh1>\n        <div class=\"sub\">What the projection does to every asset, year by year — plus assumptions.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"badge\">Reference<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"lead\">Every asset compounds at <b>its own return<\u002Fb> and, where relevant, receives contributions until you retire. All returns can be shifted together by the <b>Market scenario<\u002Fb> (Bad / Base / Good) in the Testing panel to stress-test sequence risk. Growth on super &amp; shares is applied at the index rate; tax is realised only on sale.<\u002Fp>\n\n    <div class=\"sec-title\">The asset types<\u002Fdiv>\n    <div class=\"assets\">\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#1f4e79\"><\u002Fspan><h4>Super / SMSF<\u002Fh4><\u002Fdiv>\n        <p>Balance compounds at its return each year and receives contributions while you're working. Grows untaxed at the index rate; locked until <b>preservation age<\u002Fb>.<\u002Fp>\n        <span class=\"form\">next = balance × (1 + return) + contributions<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#15375c\"><\u002Fspan><h4>UniSuper Defined Benefit<\u002Fh4><\u002Fdiv>\n        <p>Not a balance — an <b>entitlement<\u002Fb> built from benefit salary × years of service × age &amp; service factors, growing with salary growth and service. Any accumulation-account component grows at its own return. Taken as a <b>lump sum at retirement<\u002Fb>.<\u002Fp>\n        <span class=\"form\">benefit = salary × service × factors<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#2f6fd0\"><\u002Fspan><h4>Shares / ETF<\u002Fh4><\u002Fdiv>\n        <p>Balance compounds at its return plus regular contributions (dollar-cost averaging). Milestones flag when annual <b>return<\u002Fb> overtakes your annual <b>contribution<\u002Fb>.<\u002Fp>\n        <span class=\"form\">next = balance × (1 + return) + contributions<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#5a86c4\"><\u002Fspan><h4>Cash &amp; term deposits<\u002Fh4><\u002Fdiv>\n        <p>Grows at its interest rate — no contributions modelled. This is your <b>liquid, always-accessible<\u002Fb> pool, and the source spending is drawn from first.<\u002Fp>\n        <span class=\"form\">next = balance × (1 + rate)<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#2a9d8f\"><\u002Fspan><h4>Investment property<\u002Fh4><\u002Fdiv>\n        <p>Value compounds at capital growth. Rent (value × yield) minus outgoings, loan interest and principal flows to cash — a rental loss gives a negative-gearing tax benefit. Sold at the sell age (default = retirement): CGT at the non-super rate (no 50% discount), net proceeds → cash. Table shows <b>equity = value − loan<\u002Fb>.<\u002Fp>\n        <span class=\"form\">value × (1+growth); equity = value − loan<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"acard\">\n        <div class=\"top\"><span class=\"chip\" style=\"background:#e0a458\"><\u002Fspan><h4>Home (PPOR)<\u002Fh4><\u002Fdiv>\n        <p>Value compounds at capital growth; the loan amortises as repayments pay it down. Equity rises from <b>both<\u002Fb> sides. At retirement it can be refinanced to <b>80% LVR<\u002Fb> to bank a cash buffer for the bridge.<\u002Fp>\n        <span class=\"form\">equity = value − loan; refi = 0.8·value − loan<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sec-title\" style=\"margin-top:11px\">How the plan actually pays you in retirement<\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"flow-row\">\n        <div class=\"flow-box\">\n          <div class=\"t\" style=\"color:#9fd6c0\">① At retirement<\u002Fdiv>\n          <p>Refinance the home to 80% LVR and bank the cash as a security buffer. Super &amp; DB become the long-term engine.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"arrow\">→<\u002Fdiv>\n        <div class=\"flow-box\">\n          <div class=\"t\" style=\"color:#9fd6c0\">② Bridge years (before 60)<\u002Fdiv>\n          <p>Spending is paid from <b>cash<\u002Fb>, topped up from <b>shares<\u002Fb> as needed. Super stays locked and keeps compounding.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"arrow\">→<\u002Fdiv>\n        <div class=\"flow-box\">\n          <div class=\"t\" style=\"color:#9fc0e8\">③ Pension years (after 60)<\u002Fdiv>\n          <p>Super unlocks — spending is drawn from it (never below the ATO minimum drawdown). Shares keep compounding.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cols\">\n      <div>\n        <div class=\"sec-title\">Two more things to know<\u002Fdiv>\n        <div class=\"card\">\n          <h4>Today's $ vs Future $<\u002Fh4>\n          <p>Toggle at the top of the results. <b>Today's $<\u002Fb> = money you understand now (inflation stripped out). <b>Future $<\u002Fb> = the actual larger nominal numbers. Targets are always in today's money.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <h4>Stress-test it<\u002Fh4>\n          <p>In the 🧪 Testing panel, switch <b>Market scenario<\u002Fb> to <b style=\"color:#c0392b\">Bad<\u002Fb> to lower every return by the swing, or add a one-off <b>Sequence Shock<\u002Fb> (a crash in a chosen year). If you still don't run out, you're robust.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"sec-title\">Key multiples, at a glance<\u002Fdiv>\n        <table class=\"whytab\" style=\"border:1px solid #ece6d8;border-radius:9px;overflow:hidden\">\n          <tbody><tr><th>Rule<\u002Fth><th>≈ Draw<\u002Fth><th>Tests<\u002Fth><\u002Ftr>\n          <tr><td class=\"m\">34×<\u002Ftd><td>2.9%<\u002Ftd><td>Total capital<\u002Ftd><\u002Ftr>\n          <tr><td class=\"m\">27×<\u002Ftd><td>3.7%<\u002Ftd><td>Growth assets<\u002Ftd><\u002Ftr>\n          <tr><td class=\"m\">7×<\u002Ftd><td>—<\u002Ftd><td>Cash for bridge<\u002Ftd><\u002Ftr>\n          <tr><td class=\"m\">(x+b)×<\u002Ftd><td>—<\u002Ftd><td>Whole bridge + buffer<\u002Ftd><\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n        <p style=\"font-size:9.6px;color:#7a8290;line-height:1.45;margin-top:7px\"><b>x<\u002Fb> = years from your age to preservation; <b>b<\u002Fb> = your Security buffer (extra years, set in Your Plan). All multiples are applied to your <b>today's-dollar annual spending<\u002Fb>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <div class=\"ass\">\n        <h5>⚠ Good to know (assumptions)<\u002Fh5>\n        <p>Returns are fixed estimates, not real market ups-and-downs. Tax on shares/super is applied only on sale, at a flat rate (no franking credits; property CGT takes no 50% discount). The 80% refinance at retirement assumes a lender will offer it. Defined Benefit is treated as a lump sum taken at retirement.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ass\" style=\"flex:.85\">\n        <h5>Not financial advice<\u002Fh5>\n        <p class=\"disc\">This is an educational planning sandbox to explore scenarios — a guide only. It is not financial, tax, or retirement advice. Check important decisions with a licensed adviser.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pageno\">Page 2 of 2 · Assets<\u002Fdiv>\n  <\u002Fdiv>\n\n  \n\n\n<\u002Fbody><\u002Fhtml>"
