'Public Sans';padding:3px 12px 8px;white-space:nowrap;color:#cfddef\">Closing<\u002Fth>\n                \n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"background:{{ r.bg }};border-bottom:1px solid #f0eadc\">\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.age }}<\u002Ftd>\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.year }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#5a6472;white-space:nowrap;border-left:1px solid #eee7d8\">{{ c.open }}<\u002Ftd>\n                    <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#2a5a8c;white-space:nowrap\">{{ c.contrib }}<\u002Ftd>\n                    <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#1a7a4c;white-space:nowrap\">{{ c.ret }}<\u002Ftd>\n                    <td style=\"text-align:right;font:700 12px 'Public Sans';padding:7px 12px;color:#0c2340;white-space:nowrap\">{{ c.close }}<\u002Ftd>\n                  \n                  <td style=\"text-align:right;font:700 12px 'Public Sans';padding:7px 14px;color:#0c2340;white-space:nowrap;border-left:1px solid #dfe7d9;background:#f3f8f4\">{{ r.total }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:11px 2px 6px;line-height:1.5\">For Defined Benefit, Return includes the yearly growth in your entitlement (salary, service &amp; lump-sum factor) plus earnings on its accumulation account. Contributions stop at retirement where set to “only while working”. The final highlighted <strong style=\"color:#15375c\">retirement-age row<\u002Fstrong> is a snapshot at the <em>start<\u002Fem> of that year — your balance on retirement day (the closing total of the prior year), so it shows no contribution or return; growth from then on is picked up by the Decumulation Forecast.<\u002Fp>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasEtf }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 22px 10px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <h2 style=\"font:600 16px 'Lora',serif;margin-bottom:3px\">Accumulation Forecast - SHARE ({{ accRange }})<\u002Fh2>\n        <p style=\"font:400 12px 'Public Sans';color:#8a8576;margin-bottom:12px\">Dollar-cost-averaging view. Two milestones: ◆ when annual return overtakes your annual contribution, and ★ when it covers your annual spending.<\u002Fp>\n        <div class=\"wf-scroll\" style=\"max-height:340px;overflow:auto;border:1px solid #eee7d8;border-radius:8px\">\n          <sc-for list=\"{{ etfFcRows }}\" as=\"r\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums\">\n            <thead>\n              <tr style=\"position:sticky;top:0;background:#0c2340;color:#fff;z-index:1\">\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Age<\u002Fth>\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Year<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Opening<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Annual<br>contribution<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Annual<br>return<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Closing<br>balance<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Cumul.<br>contributed<\u002Fth>\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Milestone<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"background:{{ r.bg }};border-bottom:1px solid #f0eadc\">\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.age }}<\u002Ftd>\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.year }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#5a6472;white-space:nowrap\">{{ r.open }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#2f6fd0;white-space:nowrap\">{{ r.contrib }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#1a7a4c;white-space:nowrap\">{{ r.ret }}<\u002Ftd>\n                  <td style=\"text-align:right;font:700 12px 'Public Sans';padding:7px 12px;color:#0c2340;white-space:nowrap\">{{ r.close }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#9a9484;white-space:nowrap\">{{ r.cumul }}<\u002Ftd>\n                  <td style=\"text-align:left;font:600 11px 'Public Sans';padding:7px 12px;color:{{ r.milestoneColor }};white-space:nowrap;font-weight:{{ r.milestoneWeight }}\">{{ r.milestone }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:11px 2px 6px;line-height:1.5\"><strong style=\"color:#1a7a4c\">◆<\u002Fstrong> first year your <strong>annual return<\u002Fstrong> exceeds your <strong>annual contribution<\u002Fstrong> (compounding now does more than you do); <strong style=\"color:#15693f\">★<\u002Fstrong> first year your annual return alone covers your <strong>annual spending<\u002Fstrong>. ✓ marks every year past the first crossover. The final highlighted <strong style=\"color:#15375c\">◆ retire<\u002Fstrong> row is a snapshot at the <em>start<\u002Fem> of the retirement year — your balance on retirement day (the prior year's closing total), so it shows no contribution or return; growth from then on is picked up by the Decumulation Forecast.<\u002Fp>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n\n      <sc-if value=\"{{ hasDecum }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 22px 10px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <h2 style=\"font:600 16px 'Lora',serif;margin-bottom:3px\">Decumulation Forecast ({{ effRetAge }} → 100)<\u002Fh2>\n        <p style=\"font:400 12px 'Public Sans';color:#8a8576;margin-bottom:12px\">Each year, <strong style=\"color:#1f4e79\">Super<\u002Fstrong> &amp; <strong style=\"color:#2f6fd0\">Shares<\u002Fstrong> grow at the index rate; spending is paid from <strong style=\"color:#1f7a6e\">Cash<\u002Fstrong>, which is topped up from <strong style=\"color:#2f6fd0\">Shares<\u002Fstrong> in <strong style=\"color:#b9822f\">Bridge<\u002Fstrong> years (before preservation age) and from <strong style=\"color:#1f4e79\">Super<\u002Fstrong> in <strong style=\"color:#15693f\">Pension<\u002Fstrong> years — never below the ATO minimum pension drawdown.<\u002Fp>\n        <div class=\"wf-scroll\" style=\"max-height:360px;overflow:auto;border:1px solid #eee7d8;border-radius:8px\">\n          <sc-for list=\"{{ decumRows }}\" as=\"r\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums\">\n            <thead>\n              <tr style=\"position:sticky;top:0;background:#0c2340;color:#fff;z-index:1\">\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Age<\u002Fth>\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Year<\u002Fth>\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Phase<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Spending<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;color:#e6b8b0\">ATO min<br>draw<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap\">Cash<br>top-up<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;color:#9fd6c0\">Cash<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;color:#bcd4f5\">Share<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;color:#9fc0e8\">Super<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;color:#e8c79f\">Property<br>(home equity)<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:9px 12px;white-space:nowrap;border-left:1px solid rgba(255,255,255,.14)\">Investable<br>Retirement Capital<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"background:{{ r.bg }};border-bottom:1px solid #f0eadc\">\n                  <td style=\"text-align:left;font:500 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.age }}{{ r.milestone }}<\u002Ftd>\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 12px;color:#1c2b3a;white-space:nowrap\">{{ r.year }}<\u002Ftd>\n                  <td style=\"text-align:left;font:600 11px 'Public Sans';padding:7px 12px;white-space:nowrap;color:{{ r.phaseColor }}\">{{ r.phase }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#5a6472;white-space:nowrap\">{{ r.spend }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#b5564a;white-space:nowrap\">{{ r.minDraw }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 11px 'Public Sans';padding:7px 12px;white-space:nowrap;color:{{ r.topUpColor }}\">{{ r.topUp }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#1f7a6e;white-space:nowrap\">{{ r.cash }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#2f6fd0;white-space:nowrap\">{{ r.etf }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#1f4e79;white-space:nowrap\">{{ r.smsf }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 12px;color:#b07d3c;white-space:nowrap\">{{ r.property }}<\u002Ftd>\n                  <td style=\"text-align:right;font:700 12px 'Public Sans';padding:7px 12px;color:#0c2340;white-space:nowrap;border-left:1px solid #eee7d8\">{{ r.capital }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:11px 2px 4px;line-height:1.55\">From your retirement age to 100, balances are projected forward each year: <strong style=\"color:#5a6472\">SUPER &amp; SHARE<\u002Fstrong> grow untaxed at the index rate — tax is realized only on sale: <strong style=\"color:#5a6472\">shares<\u002Fstrong> incur CGT at your non-super rate on the gain when sold, and <strong style=\"color:#5a6472\">super<\u002Fstrong> above $3M incurs the extra 15% (Div 296) on realized gains after preservation age. <strong style=\"color:#5a6472\">HOME<\u002Fstrong> grows less loan repayments. <strong style=\"color:#5a6472\">SPENDING<\u002Fstrong> is your annual figure held constant in real terms (rising with inflation in future dollars) and paid from cash. <strong style=\"color:#5a6472\">CASH<\u002Fstrong> is topped up by shares if less than next year's spending before preservation age; topped up by SUPER after preservation age (no less than the ATO minimum pension drawdown), then by SHARES once super is exhausted.<\u002Fp>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:0 2px 6px;line-height:1.5\"><strong style=\"color:#b9822f\">Bridge<\u002Fstrong> = before preservation age (top-up from shares); <strong style=\"color:#15693f\">Pension<\u002Fstrong> = preservation age onward (top-up from Super, at least the ATO minimum). <strong style=\"color:#15375c\">◆<\u002Fstrong> retirement · <strong style=\"color:#1f7a6e\">○<\u002Fstrong> preservation age. Balances are each year's closing total. A guide only — not financial advice.<\u002Fp>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:980}}\">\nclass Component extends DCLogic {\n  state = {\n    todayDollars: false,\n    baseYear: 2025,\n    testCases: [],\n    shock: { on: false, year: 2, mag: 50, ret: 8 },\n    drawerOpen: false,\n    rt: { age: 62, spend: 120000, cash: 800000, etf: 1800000, smsf: 1600000 },\n    profile: {\n      currentAge: 38, retireAge: 65, preservationAge: 60, endAge: 90, startYear: new Date().getFullYear(),\n      desiredIncome: 70000, withdrawalRate: 4, targetAssets: 1750000, targetLiquidity: 1500000, bridgeBuffer: 2, postPresBuffer: 5,\n      inflation: 2.5, outsideTax: 0, concessionalCap: 30000, scenario: 'base', scenarioSwing: 2, minDrawdown: false, defensivePct: 20\n    },\n    assets: [\n      { id: 'a1', type: 'super', name: 'UniSuper Accumulation', balance: 100000, ret: 7, contribFreq: 'annual', contribAmount: 14400, contribWhileWorking: true },\n      { id: 'a2', type: 'db', name: 'UniSuper Defined Benefit',\n        benefitSalary: 120000, salaryGrowth: 3, yearsService: 8, asf: 100, acf: 100,\n        accountBalance: 30000, accountReturn: 7, contribAmount: 0, contribFreq: 'fortnightly', contribWhileWorking: true },\n      { id: 'a4', type: 'etf', name: 'Shares', balance: 150000, ret: 7.5, contribFreq: 'monthly', contribAmount: 0, contribWhileWorking: true },\n      { id: 'a5', type: 'cash', name: 'Cash & Term Deposits', balance: 40000, ret: 3.5 },\n      { id: 'a6', type: 'property', name: 'Investment Property', balance: 650000, ret: 4.5, rentYield: 3.5, outgoings: 25, costBase: 480000, loan: 400000, loanRate: 6, repayment: 2600, repayFreq: 'monthly' },\n      { id: 'a7', type: 'home', name: 'Home (PPOR)', balance: 1100000, ret: 4, loan: 300000 }\n    ]\n  };\n\n  uid(p) { return (p || 'id') + Math.random().toString(36).slice(2, 8); }\n  num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n\n  constructor(props) {\n    super(props);\n    // Restore persisted profile/assets synchronously (before first paint) so the\n    // component never renders a transient \"default assets\" frame that some render\n    // paths (e.g. table row lists) can get stuck on if restored a tick later.\n    try {\n      const raw = localStorage.getItem('wealthForecast_state_v1');\n      if (raw) {\n        const saved = JSON.parse(raw);\n        this.state = {\n          ...this.state,\n          profile: { ...this.state.profile, ...(saved.profile || {}) },\n          assets: (Array.isArray(saved.assets) && saved.assets.length) ? saved.assets : this.state.assets\n        };\n      }\n    } catch (e) {}\n  }\n\n  componentDidMount() {\n    // Load saved test cases (seeded with the built-in Test Case #1 on first run)\n    try {\n      const t = JSON.parse(localStorage.getItem('wealthForecast_testcases_v1') || 'null');\n      this.setState({ testCases: (Array.isArray(t) && t.length) ? t : this.defaultCases() });\n    } catch (e) { this.setState({ testCases: this.defaultCases() }); }\n    // Open the guide via a fetched blob URL. A direct new-tab navigation to the\n    // serve path fails with \"preview token required\"; fetching from within this\n    // already-authenticated page carries credentials, then we open it locally.\n    try {\n      const a = document.querySelector('a[data-guide-link]');\n      if (a) {\n        a.addEventListener('click', async (ev) => {\n          ev.preventDefault();\n          const w = window.open('', '_blank');\n          try {\n            const res = await fetch(a.getAttribute('href'), { credentials: 'include' });\n            const html = await res.text();\n            const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));\n            if (w) w.location = url; else window.open(url, '_blank');\n          } catch (e) {\n            if (w) w.close();\n            window.open(a.href, '_blank');\n          }\n        });\n      }\n    } catch (e) {}\n  }\n  componentDidUpdate() {\n    try {\n      localStorage.setItem('wealthForecast_state_v1', JSON.stringify({ profile: this.state.profile, assets: this.state.assets }));\n    } catch (e) {}\n  }\n\n  updateProfile(key, val) {\n    this.setState(s => ({ profile: { ...s.profile, [key]: val } }));\n  }\n\n  // ---- sequence-of-returns stress test ----\n  setShock(key, val) { this.setState(s => ({ shock: { ...s.shock, [key]: val } })); }\n  toggleShock() { this.setState(s => ({ shock: { ...s.shock, on: !s.shock.on } })); }\n\n  // ---- test cases ----\n  defaultCases() {\n    return [{\n      id: 'tc1', name: '#1 · Single / Super + Cash',\n      profile: { currentAge: '24', retireAge: '55', preservationAge: 60, endAge: 90, startYear: 2026, desiredIncome: '52000', withdrawalRate: 4, targetAssets: 1750000, targetLiquidity: 1500000, bridgeBuffer: 2, postPresBuffer: 5, inflation: '3', outsideTax: '30', concessionalCap: '35000', scenario: 'base', scenarioSwing: 2, minDrawdown: false, defensivePct: 20 },\n      assets: [\n        { id: 'a1', type: 'super', name: 'Accumulation', balance: '19000', ret: '10', contribFreq: 'annual', contribAmount: '30000', contribWhileWorking: true, owner: 'A' },\n        { id: 'a2', type: 'cash', name: 'Cash', balance: '52000', ret: '4' }\n      ]\n    }, {\n      id: 'tc2', name: '#2 · Couple / Super + Cash',\n      profile: { currentAge: '24', retireAge: '55', preservationAge: 60, endAge: 90, startYear: 2026, desiredIncome: '104000', withdrawalRate: 4, targetAssets: 1750000, targetLiquidity: 1500000, bridgeBuffer: 2, postPresBuffer: 5, inflation: '3', outsideTax: '30', concessionalCap: '35000', scenario: 'base', scenarioSwing: 2, minDrawdown: false, defensivePct: 20 },\n      assets: [\n        { id: 'a1', type: 'super', name: 'Accumulation', balance: '19000', ret: '10', contribFreq: 'annual', contribAmount: '30000', contribWhileWorking: true, owner: 'A' },\n        { id: 'a2', type: 'cash', name: 'Cash', balance: '52000', ret: '4' },\n        { id: 'aplm135', type: 'super', name: 'Super fund', balance: '19000', ret: '10', contribFreq: 'annual', contribAmount: '30000', contribWhileWorking: true, owner: 'B' }\n      ]\n    }];\n  }\n  persistCases(tc) { try { localStorage.setItem('wealthForecast_testcases_v1', JSON.stringify(tc)); } catch (e) {} }\n  applyCase(id) {\n    const c = this.state.testCases.find(x => x.id === id);\n    if (!c) return;\n    this.setState({ profile: { ...c.profile }, assets: c.assets.map(a => ({ ...a })) });\n  }\n  saveCurrentCase() {\n    const def = '#' + (this.state.testCases.length + 1) + ' · ';\n    const name = window.prompt('Name this test case:', def);\n    if (name == null || !name.trim()) return;\n    const c = { id: this.uid('tc'), name: name.trim(), profile: { ...this.state.profile }, assets: this.state.assets.map(a => ({ ...a })) };\n    const tc = [...this.state.testCases, c];\n    this.setState({ testCases: tc }); this.persistCases(tc);\n  }\n  deleteCase(id) {\n    const tc = this.state.testCases.filter(x => x.id !== id);\n    this.setState({ testCases: tc }); this.persistCases(tc);\n  }\n  updateAsset(id, key, val) {\n    this.setState(s => ({ assets: s.assets.map(a => a.id === id ? { ...a, [key]: val } : a) }));\n  }\n  updateFactor(aid, fid, key, val) {\n    this.setState(s => ({ assets: s.assets.map(a => a.id !== aid ? a : { ...a, factors: a.factors.map(f => f.id === fid ? { ...f, [key]: val } : f) }) }));\n  }\n  addFactor(aid) {\n    this.setState(s => ({ assets: s.assets.map(a => a.id !== aid ? a : { ...a, factors: [...a.factors, { id: this.uid('f'), name: 'New factor', value: 1, mode: 'static' }] }) }));\n  }\n  removeFactor(aid, fid) {\n    this.setState(s => ({ assets: s.assets.map(a => a.id !== aid ? a : { ...a, factors: a.factors.filter(f => f.id !== fid) }) }));\n  }\n  removeAsset(id) { this.setState(s => ({ assets: s.assets.filter(a => a.id !== id) })); }\n  addAsset(type) {\n    const defs = {\n      super: { name: 'Super fund', balance: 80000, ret: 7, contribFreq: 'annual', contribAmount: 14400, contribWhileWorking: true },\n      smsf: { name: 'SMSF', balance: 150000, ret: 6.5, contribFreq: 'annual', contribAmount: 0, contribWhileWorking: true },\n      etf: { name: 'Shares', balance: 50000, ret: 7.5, contribFreq: 'monthly', contribAmount: 0, contribWhileWorking: true },\n      cash: { name: 'Cash', balance: 20000, ret: 3.5 },\n      property: { name: 'Investment property', balance: 600000, ret: 4.5, rentYield: 3.5, outgoings: 25, costBase: 450000, loan: 380000, loanRate: 6, repayment: 2500, repayFreq: 'monthly' },\n      home: { name: 'Home (PPOR)', balance: 900000, ret: 4, loan: 250000, loanRate: 6, repayment: 3000, repayFreq: 'monthly' },\n      db: { name: 'UniSuper Defined Benefit', benefitSalary: 120000, salaryGrowth: 3, yearsService: 5, asf: 100, acf: 100, accountBalance: 0, accountReturn: 7, contribAmount: 0, contribFreq: 'fortnightly', contribWhileWorking: true }\n    };\n    const base = defs[type] || defs.etf;\n    this.setState(s => ({ assets: [...s.assets, { id: this.uid('a'), type, ...base }] }));\n  }\n  toggleToday() { this.setState(s => ({ todayDollars: !s.todayDollars })); }\n  scenarioDelta() { const s = this.num(this.state.profile.scenarioSwing); const sw = isNaN(s) ? 2 : s; return ({ good: sw, base: 0, bad: -sw })[this.state.profile.scenario] || 0; }\n  minPensionRate(age) { const a = this.num(age); if (a < 65) return 0.04; if (a < 75) return 0.05; if (a < 80) return 0.06; if (a < 85) return 0.07; if (a < 90) return 0.09; if (a < 95) return 0.11; return 0.14; }\n\n  freqMult(freq) { return ({ weekly: 52, fortnightly: 26, monthly: 12, quarterly: 4, annual: 1 })[freq] || 1; }\n  annualContrib(a) {\n    return this.num(a.contribAmount) * this.freqMult(a.contribFreq || 'annual');\n  }\n\n  lsf(age) { const a = this.num(age); if (a <= 40) return 0.18; if (a >= 65) return 0.23; return 0.18 + (a - 40) * 0.002; }\n  dbComponent(a, tEff, curAge) {\n    const bs = this.num(a.benefitSalary) * Math.pow(1 + this.num(a.salaryGrowth) / 100, tEff);\n    const svc = this.num(a.yearsService) + tEff;\n    return bs * svc * this.lsf(curAge + tEff) * (this.num(a.asf) / 100) * (this.num(a.acf) / 100);\n  }\n\n  factorVal(f, t) {\n    const v = this.num(f.value);\n    if (f.mode === 'salary') return v * Math.pow(1 + this.num(f.growth) / 100, t);\n    if (f.mode === 'step') {\n      let x = v + this.num(f.perYear) * t;\n      if (f.max !== '' && f.max != null && !isNaN(parseFloat(f.max))) x = Math.min(x, parseFloat(f.max));\n      return x;\n    }\n    return v;\n  }\n\n  meta(type) {\n    return ({\n      super: { label: 'Super', color: '#14365c', cat: 'superDB' },\n      db: { label: 'UniSuper Defined Benefit', color: '#1f4e79', cat: 'superDB' },\n      smsf: { label: 'SMSF', color: '#2a5a8c', cat: 'superDB' },\n      etf: { label: 'Shares', color: '#3b82f6', cat: 'liquid' },\n      cash: { label: 'Cash', color: '#7aa8e0', cat: 'liquid' },\n      property: { label: 'Property', color: '#2a9d8f', cat: 'invProp' },\n      home: { label: 'Home', color: '#e0a458', cat: 'home' }\n    })[type];\n  }\n\n  project(shock) {\n    const p = this.state.profile;\n    const shk = (shock && shock.on) ? { year: Math.max(1, this.num(shock.year) || 2), mag: (this.num(shock.mag) || 0) / 100, ret: (this.num(shock.ret) || 0) / 100 } : null;\n    let retStartAge = null;   // age at which decumulation begins (for shock timing)\n    const cur = this.num(p.currentAge);\n    const presAge = this.num(p.preservationAge);\n    const bridgeBuf = (p.bridgeBuffer == null || p.bridgeBuffer === '') ? 2 : this.num(p.bridgeBuffer);   // extra years of spending added to the bridge-bucket readiness test\n    const targetRetAge = this.num(p.retireAge);\n    const HORIZON = 100;\n    const infl = this.num(p.inflation) / 100;\n    const outTax = this.num(p.outsideTax) / 100;\n    const dScen = this.scenarioDelta();\n    const rrate = a => (this.num(a.ret) + dScen) / 100;\n    const dbrate = a => (this.num(a.accountReturn) + dScen) / 100;\n    const spendBase = this.num(p.desiredIncome);\n    const assets = this.state.assets;\n    const spendAt = t => spendBase * Math.pow(1 +
