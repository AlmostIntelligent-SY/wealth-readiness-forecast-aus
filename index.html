document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-scroll{max-height:none !important;overflow:visible !important;border:none !important}\n    table thead tr{position:static !important}\n    table thead th{position:static !important}\n    header{position:static !important}\n    .wf-grid{display:block !important;max-width:none !important;padding:0 !important;gap:0 !important}\n    .wf-results{page-break-before:always}\n    .wf-results section{page-break-before:always}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#efece4;font-family:'Public Sans',-apple-system,sans-serif;color:#1c2b3a;padding-bottom:48px\">\n\n  <div class=\"wf-no-print\" onclick=\"{{ onCloseDrawer }}\" style=\"{{ drawerBackdropStyle }}\"><\u002Fdiv>\n  <div class=\"wf-no-print\" style=\"{{ drawerStyle }}\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:15px 18px;background:#0c2340;color:#fff;flex-shrink:0\">\n      <span style=\"font:700 12px 'Public Sans';letter-spacing:.14em;text-transform:uppercase;color:#9fc0e8\">🧪 Testing<\u002Fspan>\n      <button onclick=\"{{ onCloseDrawer }}\" title=\"Close\" style=\"border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font:700 15px 'Public Sans';width:28px;height:28px;border-radius:7px;line-height:1\" style-hover=\"background:rgba(255,255,255,.22)\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px\">\n\n      <details open=\"{{ true }}\" style=\"background:#0c2340;color:#fff;border-radius:12px;overflow:hidden\">\n        <summary class=\"wf-sum\" style=\"padding:11px 14px;background:rgba(255,255,255,.06)\">\n          <span style=\"font:700 11px 'Public Sans';letter-spacing:.1em;text-transform:uppercase;color:#9fc0e8\">Test Cases · {{ testCount }}<\u002Fspan>\n        <\u002Fsummary>\n        <div style=\"padding:10px 11px 12px;display:flex;flex-direction:column;gap:7px\">\n          <sc-for list=\"{{ testCases }}\" as=\"c\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex;align-items:stretch;gap:6px\">\n              <button onclick=\"{{ onApplyCase }}\" data-case=\"{{ c.id }}\" style=\"flex:1;text-align:left;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;font:600 12px 'Public Sans';padding:9px 11px;border-radius:8px;line-height:1.3\" style-hover=\"background:rgba(159,192,232,.22);border-color:#9fc0e8\">{{ c.name }}<\u002Fbutton>\n              <sc-if value=\"{{ c.deletable }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ onDeleteCase }}\" data-case=\"{{ c.id }}\" title=\"Delete\" style=\"border:1px solid rgba(255,255,255,.16);background:transparent;color:#e6b8b0;cursor:pointer;font:700 13px 'Public Sans';width:30px;border-radius:8px\" style-hover=\"background:rgba(192,57,43,.3)\">×<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{ onSaveCase }}\" style=\"margin-top:2px;border:1px dashed rgba(159,192,232,.5);background:transparent;color:#9fc0e8;cursor:pointer;font:600 11.5px 'Public Sans';padding:9px;border-radius:8px\" style-hover=\"background:rgba(159,192,232,.14)\">＋ Save current as test case<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details open=\"{{ true }}\" style=\"background:#3a1618;color:#fff;border-radius:12px;overflow:hidden\">\n        <summary class=\"wf-sum\" style=\"padding:11px 14px;background:rgba(255,255,255,.06)\">\n          <span style=\"font:700 11px 'Public Sans';letter-spacing:.08em;text-transform:uppercase;color:#f0b8b0\">⚡ Sequence Shock{{ shockStateLabel }}<\u002Fspan>\n        <\u002Fsummary>\n        <div style=\"padding:11px 13px 13px;display:flex;flex-direction:column;gap:10px\">\n          <label style=\"display:flex;align-items:center;gap:9px;cursor:pointer;font:600 12px 'Public Sans'\">\n            <input type=\"checkbox\" checked=\"{{ shockOn }}\" onchange=\"{{ onToggleShock }}\" style=\"width:16px;height:16px;accent-color:#e0554c\">\n            Enable stress test\n          <\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 9.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#e5a49c;margin-bottom:4px;display:block\">Shock year (after retirement)<\u002Fspan><input type=\"number\" min=\"1\" max=\"30\" value=\"{{ shockYear }}\" data-k=\"year\" oninput=\"{{ onShockField }}\" style=\"width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;border-radius:7px;padding:7px 9px;font:600 13px 'Public Sans'\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 9.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#e5a49c;margin-bottom:4px;display:block\">Crash magnitude (% drop)<\u002Fspan><input type=\"number\" min=\"0\" max=\"90\" value=\"{{ shockMag }}\" data-k=\"mag\" oninput=\"{{ onShockField }}\" style=\"width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;border-radius:7px;padding:7px 9px;font:600 13px 'Public Sans'\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 9.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#e5a49c;margin-bottom:4px;display:block\">Post-shock return (% /yr, nominal)<\u002Fspan><input type=\"number\" min=\"0\" max=\"20\" step=\"0.5\" value=\"{{ shockRet }}\" data-k=\"ret\" oninput=\"{{ onShockField }}\" style=\"width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;border-radius:7px;padding:7px 9px;font:600 13px 'Public Sans'\"><\u002Flabel>\n          <sc-if value=\"{{ shockOn }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-top:1px solid rgba(255,255,255,.14);padding-top:9px;display:flex;flex-direction:column;gap:5px\">\n              <sc-for list=\"{{ shockSummary }}\" as=\"m\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><span style=\"font:500 11px 'Public Sans';color:#e5a49c\">{{ m.label }}<\u002Fspan><span style=\"font:700 12px 'Public Sans';color:#fff\">{{ m.val }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font:400 10px 'Public Sans';color:#c99a94;line-height:1.4\">Halves Shares &amp; Super in the shock year (after growth, before spending); they grow at the fixed post-shock rate thereafter. Cash &amp; Property unaffected.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details style=\"background:#12263f;color:#fff;border-radius:12px;overflow:hidden\">\n        <summary class=\"wf-sum\" style=\"padding:11px 14px;background:rgba(255,255,255,.06)\">\n          <span style=\"font:700 11px 'Public Sans';letter-spacing:.08em;text-transform:uppercase;color:#9fc0e8\">📈 Market Scenario<\u002Fspan>\n        <\u002Fsummary>\n        <div style=\"padding:11px 13px 13px;display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:block\"><span style=\"font:600 9.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9fc0e8;margin-bottom:5px;display:block\">Scenario<\u002Fspan>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px\">\n              <button data-scenario=\"bad\" onclick=\"{{ onScenario }}\" style=\"border:none;cursor:pointer;font:600 11px 'Public Sans';padding:7px 4px;border-radius:6px;background:{{ scenBadBg }};color:{{ scenBadColor }}\">Bad<\u002Fbutton>\n              <button data-scenario=\"base\" onclick=\"{{ onScenario }}\" style=\"border:none;cursor:pointer;font:600 11px 'Public Sans';padding:7px 4px;border-radius:6px;background:{{ scenBaseBg }};color:{{ scenBaseColor }}\">Base<\u002Fbutton>\n              <button data-scenario=\"good\" onclick=\"{{ onScenario }}\" style=\"border:none;cursor:pointer;font:600 11px 'Public Sans';padding:7px 4px;border-radius:6px;background:{{ scenGoodBg }};color:{{ scenGoodColor }}\">Good<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <label style=\"display:block\"><span style=\"font:600 9.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9fc0e8;margin-bottom:4px;display:block\">Scenario swing (±%)<\u002Fspan><input type=\"number\" step=\"0.5\" value=\"{{ profile.scenarioSwing }}\" data-scope=\"profile\" data-key=\"scenarioSwing\" title=\"How far the Bad / Good scenarios shift every asset's return, each year.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fff;border-radius:7px;padding:7px 9px;font:600 13px 'Public Sans';font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <div style=\"font:400 10px 'Public Sans';color:#9fb4d0;line-height:1.4\">Shifts <em>every<\u002Fem> asset's return by the swing each year: Bad −swing · Base 0 · Good +swing.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <header class=\"wf-hdr\" style=\"background:linear-gradient(150deg,#0c2340,#15375c);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap\">\n    <div>\n      <div style=\"font:600 11px 'Public Sans';letter-spacing:.22em;text-transform:uppercase;color:#9fc0e8\">Australian Retirement Planner<\u002Fdiv>\n      <h1 style=\"font:600 27px 'Lora',serif;letter-spacing:-.01em;margin-top:3px\">Wealth Forecast &amp; Readiness<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"wf-hdr-right\" style=\"display:flex;align-items:center;gap:28px\">\n      <button onclick=\"{{ onOpenDrawer }}\" class=\"wf-no-print\" title=\"Open testing tools\" style=\"border:1px solid {{ drawerBtnBorder }};background:{{ drawerBtnBg }};color:#fff;cursor:pointer;font:700 11px 'Public Sans';letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-radius:999px;display:flex;align-items:center;gap:7px\" style-hover=\"background:rgba(255,255,255,.16)\">🧪 Testing{{ drawerBtnBadge }}<\u002Fbutton>\n      <div style=\"text-align:right\">\n        <div style=\"font:600 10px 'Public Sans';letter-spacing:.14em;text-transform:uppercase;color:#9fc0e8\">Net Worth Today<\u002Fdiv>\n        <div style=\"font:600 26px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:2px\">{{ netTodayFmt }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:{{ readyBg }};border:1px solid {{ readyBorder }};color:{{ readyColor }};padding:9px 16px;border-radius:999px;display:flex;align-items:center;gap:9px\">\n        <span style=\"width:9px;height:9px;border-radius:50%;background:{{ readyColor }};display:inline-block\"><\u002Fspan>\n        <span style=\"font:700 13px 'Public Sans';letter-spacing:.02em\">{{ readyLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"wf-grid\" style=\"max-width:1480px;margin:0 auto;padding:26px 32px;display:grid;grid-template-columns:452px 1fr;gap:26px;align-items:start\">\n    <!-- LEFT: INPUTS -->\n    <div style=\"display:flex;flex-direction:column;gap:20px\">\n\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 20px 22px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <h2 style=\"font:600 16px 'Lora',serif;margin-bottom:3px\">Your Plan<\u002Fh2>\n        <p style=\"font:400 12.5px 'Public Sans';color:#8a8576;margin-bottom:16px\">Timeline and retirement goal. All figures update live.<\u002Fp>\n        <a href=\"User%20Guide%20(shareable).html\" target=\"_blank\" rel=\"noopener\" data-guide-link=\"1\" class=\"wf-no-print\" style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:9px 12px;background:#eef6f3;border:1px solid #cfe6dd;border-radius:8px;font:600 11.5px 'Public Sans';color:#1f7a6e;text-decoration:none\" style-hover=\"background:#e3f0eb;border-color:#9fd6c0\"><span style=\"font-size:14px\">📖<\u002Fspan><span>New here? Read the Quick Start Guide<\u002Fspan><span style=\"margin-left:auto;color:#1f7a6e\">→<\u002Fspan><\u002Fa>\n        <div class=\"wf-2col\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px 14px\">\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Current age<\u002Fspan><input type=\"number\" value=\"{{ profile.currentAge }}\" data-scope=\"profile\" data-key=\"currentAge\" title=\"Your age today — the starting point of the projection.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Start year<\u002Fspan><input type=\"number\" value=\"{{ profile.startYear }}\" data-scope=\"profile\" data-key=\"startYear\" title=\"Calendar year the projection starts from.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Retirement age<\u002Fspan><input type=\"number\" value=\"{{ profile.retireAge }}\" data-scope=\"profile\" data-key=\"retireAge\" title=\"Age you stop working and start drawing on your assets.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Preservation age<\u002Fspan><input type=\"number\" value=\"{{ profile.preservationAge }}\" data-scope=\"profile\" data-key=\"preservationAge\" title=\"Age you can first legally access super (typically 60).\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Annual Spending<\u002Fspan><input type=\"number\" value=\"{{ profile.desiredIncome }}\" data-scope=\"profile\" data-key=\"desiredIncome\" title=\"Today's-dollar spending you want to fund in retirement. The readiness target is 34 × this amount.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><span style=\"font:400 10px 'Public Sans';color:#a8a290;line-height:1.4;margin-top:5px;display:block\">Today's dollars. The readiness target is 34× this amount.<\u002Fspan><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Target (34× spending)<\u002Fspan><input type=\"text\" value=\"{{ targetFmt }}\" disabled=\"\" title=\"Retirement Capital target = 34 × Annual Spending, in today's dollars (no inflation). Derived automatically — not editable.\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #e4ddcd;border-radius:7px;background:#f4f1ea;font:600 14px 'Public Sans';color:#5a6472;font-variant-numeric:tabular-nums\"><span style=\"font:400 10px 'Public Sans';color:#a8a290;line-height:1.4;margin-top:5px;display:block\">Auto: 34 × Annual Spending — a flat threshold, no inflation adjustment.<\u002Fspan><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Inflation (%/yr)<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ profile.inflation }}\" data-scope=\"profile\" data-key=\"inflation\" title=\"Annual inflation. Grows spending each year and powers the today vs future dollars toggle.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Tax on non-super earnings (%)<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ profile.outsideTax }}\" data-scope=\"profile\" data-key=\"outsideTax\" title=\"Tax rate applied to returns on assets held outside super (ETF, cash).\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Concessional cap ($/yr)<\u002Fspan><input type=\"number\" value=\"{{ profile.concessionalCap }}\" data-scope=\"profile\" data-key=\"concessionalCap\" title=\"Annual pre-tax (concessional) super contribution cap per person. Excess is taxed at marginal rates.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576;margin-bottom:5px;display:block\">Security buffer (yrs)<\u002Fspan><input type=\"number\" min=\"0\" step=\"1\" value=\"{{ profile.bridgeBuffer }}\" data-scope=\"profile\" data-key=\"bridgeBuffer\" title=\"Extra years of spending added to the bridge-bucket readiness test (③ⓑ): shares + Cash Bucket must clear (x + buffer)× spending. Affects the readiness check only — not the projection.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #d9d3c6;border-radius:7px;background:#fff;font:500 14px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><span style=\"font:400 10px 'Public Sans';color:#a8a290;line-height:1.4;margin-top:5px;display:block\">Bridge-bucket test becomes (x + buffer)× spending. Readiness only.<\u002Fspan><\u002Flabel>\n          <div style=\"grid-column:1 / -1;display:none\"><\u002Fdiv>\n          <div style=\"grid-column:1 / -1;background:#faf8f3;border:1px solid #ece6da;border-radius:8px;padding:11px 13px;font:400 11px 'Public Sans';color:#8a8576;line-height:1.6\">\n            <div style=\"margin-bottom:5px\"><strong style=\"color:#5a6472\">Wealth trajectory.<\u002Fstrong> The chart stacks every asset category from your current age to 100, so you can see the whole arc in one view — the <em>Retire<\u002Fem> marker is your chosen retirement age and <em>Preservation<\u002Fem> is when super unlocks.<\u002Fdiv>\n            <div style=\"margin-bottom:5px\"><strong style=\"color:#5a6472\">Accumulation forecast.<\u002Fstrong> Projects your wealth <em>up to your retirement age<\u002Fem> — a retirement-readiness view. Every asset grows at its return and receives its contributions until you retire.<\u002Fdiv>\n            <div style=\"margin-bottom:5px\"><strong style=\"color:#5a6472\">Decumulation forecast.<\u002Fstrong> Picks up at retirement and runs to 100: Super &amp; Shares keep growing, while spending is drawn from Cash — topped up from Shares in the <em>bridge<\u002Fem> years before preservation and from Super in the <em>pension<\u002Fem> years after (never below the ATO minimum drawdown).<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 20px 22px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px\">\n          <h2 style=\"font:600 16px 'Lora',serif\">Assets<\u002Fh2>\n          <div style=\"display:flex;align-items:baseline;gap:12px\">\n            <span style=\"font:600 12px 'Public Sans';color:#8a8576\">{{ assetCount }} held<\u002Fspan>\n            <button onclick=\"{{ onReset }}\" title=\"Clear saved entries and restore the default example\" style=\"border:none;background:transparent;color:#b3a98f;cursor:pointer;font:600 11px 'Public Sans';padding:0\" style-hover=\"color:#c0392b\">↺ Reset<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font:400 12.5px 'Public Sans';color:#8a8576;margin-bottom:16px\">Add any number of funds. Super and defined-benefit are preserved until your preservation age.<\u002Fp>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ assetViews }}\" as=\"asset\" hint-placeholder-count=\"5\">\n            <div style=\"border:1px solid #e7e1d2;border-left:4px solid {{ asset.color }};border-radius:9px;padding:13px 14px;background:#fcfbf7\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:11px\">\n                <span style=\"font:600 9.5px 'Public Sans';letter-spacing:.08em;text-transform:uppercase;color:#fff;background:{{ asset.color }};padding:3px 8px;border-radius:5px;white-space:nowrap\">{{ asset.typeLabel }}<\u002Fspan>\n                <input value=\"{{ asset.name }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"name\" oninput=\"{{ onField }}\" style=\"flex:1;min-width:0;border:none;background:transparent;font:600 14.5px 'Public Sans';color:#1c2b3a;padding:2px 0;border-bottom:1px solid transparent\" style-focus=\"border-bottom:1px solid #c9c2b2;outline:none\">\n                <button data-asset=\"{{ asset.id }}\" onclick=\"{{ onRemoveAsset }}\" title=\"Remove\" style=\"border:none;background:transparent;color:#b9b2a2;cursor:pointer;font:600 17px 'Public Sans';line-height:1;padding:2px 4px\" style-hover=\"color:#c0392b\">×<\u002Fbutton>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ asset.showOwner }}\" hint-placeholder-val=\"{{ false }}\">\n                <label style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;white-space:nowrap\">Owner<\u002Fspan><input value=\"{{ asset.owner }}\" placeholder=\"e.g. Alex\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"owner\" oninput=\"{{ onField }}\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:6px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 12.5px 'Public Sans';color:#1c2b3a\"><\u002Flabel>\n              <\u002Fsc-if>\n\n              <!-- standard balance/return assets -->\n              <sc-if value=\"{{ asset.showBalance }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:10px;align-items:end\">\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">{{ asset.balanceLabel }}<\u002Fspan><input type=\"number\" value=\"{{ asset.balance }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"balance\" title=\"Current market value of this asset.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">{{ asset.returnLabel }}<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ asset.ret }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"ret\" title=\"Expected average annual return, before tax.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ asset.showLoan }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px\">\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Outstanding loan ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.loan }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"loan\" title=\"Amount still owing on this property.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Loan rate %/yr<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ asset.loanRate }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"loanRate\" title=\"Annual interest rate charged on the loan.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px\">\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Repayment ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.repayment }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"repayment\" title=\"Scheduled repayment amount at the chosen frequency.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Frequency<\u002Fspan><select value=\"{{ asset.repayFreq }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"repayFreq\" onchange=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;cursor:pointer\"><option value=\"weekly\">Weekly<\u002Foption><option value=\"fortnightly\">Fortnightly<\u002Foption><option value=\"monthly\">Monthly<\u002Foption><option value=\"quarterly\">Quarterly<\u002Foption><option value=\"annual\">Annual<\u002Foption><\u002Fselect><\u002Flabel>\n                <\u002Fdiv>\n                <div style=\"margin-top:8px;font:400 10.5px 'Public Sans';color:#a8a290;line-height:1.5\">{{ asset.loanNote }}<\u002Fdiv>\n                <label style=\"margin-top:9px;display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 10px;background:#fff;border:1px solid #e7e1d2;border-radius:7px\"><input type=\"checkbox\" checked=\"{{ asset.refiReamortise }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"refiReamortise\" onchange=\"{{ onCheck }}\" style=\"width:14px;height:14px;accent-color:#15375c\"><span style=\"font:600 11px 'Public Sans';color:#1c2b3a\">Re-amortise at retirement refinance<\u002Fspan><span style=\"flex:1\"><\u002Fspan><span style=\"font:500 10px 'Public Sans';color:#9a9484\">over<\u002Fspan><input type=\"number\" value=\"{{ asset.loanTerm }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"loanTerm\" title=\"Loan term used to recompute the P&amp;I repayment on the refinanced balance.\" oninput=\"{{ onField }}\" style=\"width:48px;box-sizing:border-box;padding:5px 6px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 12px 'Public Sans';color:#1c2b3a;text-align:center;font-variant-numeric:tabular-nums\"><span style=\"font:500 10px 'Public Sans';color:#9a9484\">yrs<\u002Fspan><\u002Flabel>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ asset.showRental }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:10px;padding:10px 11px 11px;background:#f2f8f5;border:1px solid #d6e8de;border-radius:8px\">\n                  <div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:#1f7a6e;margin-bottom:9px\">Rental &amp; tax (AU)<\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 9px\">\n                    <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Gross rental yield %/yr<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ asset.rentYield }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"rentYield\" title=\"Annual gross rent as a % of the property's value.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                    <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Outgoings % of rent<\u002Fspan><input type=\"number\" step=\"1\" value=\"{{ asset.outgoings }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"outgoings\" title=\"Agent fees, rates, insurance, maintenance &amp; land tax as a % of gross rent.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                    <label style=\"display:block;grid-column:1 / -1\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Original purchase price ($) — CGT cost base<\u002Fspan><input type=\"number\" value=\"{{ asset.costBase }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"costBase\" title=\"Original purchase price used as the CGT cost base. The capital gain on sale = sale value − this. Leave blank to use today's value.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                  <\u002Fdiv>\n                  <label style=\"margin-top:9px;display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 10px;background:#fff;border:1px solid #d6e8de;border-radius:7px\"><span style=\"font:600 11px 'Public Sans';color:#1c2b3a\">Sell at age<\u002Fspan><input type=\"number\" value=\"{{ asset.sellAge }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"sellAge\" title=\"Age at which the property is sold — proceeds (after loan payout and CGT) roll into cash. Defaults to your retirement age.\" oninput=\"{{ onField }}\" style=\"width:56px;box-sizing:border-box;padding:5px 6px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 12px 'Public Sans';color:#1c2b3a;text-align:center;font-variant-numeric:tabular-nums\"><span style=\"flex:1\"><\u002Fspan><span style=\"font:500 10px 'Public Sans';color:#9a9484\">CGT at your non-super rate, no discount<\u002Fspan><\u002Flabel>\n                  <div style=\"margin-top:8px;font:400 10.5px 'Public Sans';color:#7d8a83;line-height:1.5\">Net rent (after outgoings &amp; interest) is added to cash each year; a rental loss reduces tax at your non-super rate (negative gearing). Capital growth uses “Capital growth %/yr” above.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ asset.showSG }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:10px;display:grid;grid-template-columns:1.3fr 1fr;gap:10px;align-items:end\">\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Contribution ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.contribAmount }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"contribAmount\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                  <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Frequency<\u002Fspan><select value=\"{{ asset.contribFreq }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"contribFreq\" onchange=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 8px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 12.5px 'Public Sans';color:#3a4350;cursor:pointer\"><option value=\"weekly\">Weekly<\u002Foption><option value=\"fortnightly\">Fortnightly<\u002Foption><option value=\"monthly\">Monthly<\u002Foption><option value=\"quarterly\">Quarterly<\u002Foption><option value=\"annual\">Annual<\u002Foption><\u002Fselect><\u002Flabel>\n                <\u002Fdiv>\n                <div style=\"margin-top:7px;display:flex;justify-content:space-between;align-items:baseline\">\n                  <label style=\"display:flex;align-items:center;gap:7px;cursor:pointer\">\n                    <input type=\"checkbox\" checked=\"{{ asset.contribWhileWorking }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"contribWhileWorking\" onchange=\"{{ onCheck }}\" style=\"width:14px;height:14px;accent-color:#15375c\">\n                    <span style=\"font:500 11.5px 'Public Sans';color:#8a8576\">Only while working<\u002Fspan>\n                  <\u002Flabel>\n                  <span style=\"font:500 11px 'Public Sans';color:#9a9484\">≈ {{ asset.contribAnnualFmt }}/yr<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- DEFINED BENEFIT: UniSuper DBD structure -->\n              <sc-if value=\"{{ asset.isDB }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:4px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\">\n                    <span style=\"font:600 10.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#9a9484\">Total DBD benefit · today<\u002Fspan>\n                    <span style=\"font:600 14px 'Lora',serif;color:{{ asset.color }};font-variant-numeric:tabular-nums\">{{ asset.currentValueFmt }}<\u002Fspan>\n                  <\u002Fdiv>\n\n                  <div style=\"background:#fff;border:1px solid #e7e1d2;border-radius:8px;padding:11px 12px 12px\">\n                    <div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:#1f4e79;margin-bottom:10px\">Defined benefit component<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:10px 9px\">\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Benefit Salary — 5-yr FAS ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.benefitSalary }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"benefitSalary\" title=\"5-year final average salary used in the UniSuper DBD formula.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Salary growth %/yr<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ asset.salaryGrowth }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"salaryGrowth\" title=\"Assumed annual growth in your benefit salary.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Current Years of Service<\u002Fspan><input type=\"number\" step=\"any\" value=\"{{ asset.yearsService }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"yearsService\" title=\"Completed years of service in the defined-benefit scheme.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <div style=\"display:flex;flex-direction:column\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Lump Sum Factor (age {{ currentAge }})<\u002Fspan><div style=\"padding:7px 9px;border:1px dashed #c9c2b2;border-radius:6px;background:#f7f5ef;font:600 13px 'Public Sans';color:#1f4e79;font-variant-numeric:tabular-nums\">{{ asset.lsfFmt }}<\u002Fdiv><\u002Fdiv>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">ASF (%)<\u002Fspan><input type=\"number\" step=\"any\" value=\"{{ asset.asf }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"asf\" title=\"Average Service Fraction — your share of full-time service (%).\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">ACF (%)<\u002Fspan><input type=\"number\" step=\"any\" value=\"{{ asset.acf }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"acf\" title=\"Average Contribution Factor — reflects your contribution rate (%).\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:10px;padding-top:8px;border-top:1px dashed #ece6da;display:flex;justify-content:space-between;align-items:baseline\">\n                      <span style=\"font:500 10.5px 'Public Sans';color:#9a9484\">Salary × Service × LSF × ASF × ACF (today's value)<\u002Fspan>\n                      <span style=\"font:600 13px 'Lora',serif;color:#1f4e79;font-variant-numeric:tabular-nums\">{{ asset.dbComponentFmt }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"background:#fff;border:1px solid #e7e1d2;border-radius:8px;padding:11px 12px 12px;margin-top:9px\">\n                    <div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:#2a5a8c;margin-bottom:10px\">Accumulation component<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 9px\">\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Current Account Balance ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.accountBalance }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"accountBalance\" title=\"Balance of the accumulation account sitting alongside the defined benefit.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Account return %/yr<\u002Fspan><input type=\"number\" step=\"0.1\" value=\"{{ asset.accountReturn }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"accountReturn\" title=\"Expected annual return on the accumulation account.\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:block\"><span style=\"font:600 10px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;color:#9a9484;margin-bottom:4px;display:block\">Fortnightly Employer Contribution ($)<\u002Fspan><input type=\"number\" value=\"{{ asset.contribAmount }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"contribAmount\" oninput=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ddd6c8;border-radius:6px;background:#fff;font:500 13px 'Public Sans';color:#1c2b3a;font-variant-numeric:tabular-nums\"><\u002Flabel>\n                      <label style=\"display:flex;align-items:center;gap:7px;align-self:end;padding-bottom:7px;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ asset.contribWhileWorking }}\" data-scope=\"asset\" data-asset=\"{{ asset.id }}\" data-key=\"contribWhileWorking\" onchange=\"{{ onCheck }}\" style=\"width:14px;height:14px;accent-color:#15375c\"><span style=\"font:500 11.5px 'Public Sans';color:#8a8576\">Only while working<\u002Fspan><\u002Flabel>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:10px;padding-top:8px;border-top:1px dashed #ece6da;display:flex;justify-content:space-between;align-items:baseline\">\n                      <span style=\"font:500 10.5px 'Public Sans';color:#9a9484\">Account balance (today's value)<\u002Fspan>\n                      <span style=\"font:600 13px 'Lora',serif;color:#2a5a8c;font-variant-numeric:tabular-nums\">{{ asset.accountBalanceFmt }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <p style=\"font:400 10.5px 'Public Sans';color:#a8a290;margin-top:8px;line-height:1.5\">Per UniSuper: the DB component earns no investment return — it grows only via salary, service and the age-based Lump Sum Factor (18.0%→23.0%). Only the accumulation balance earns a return. Figures on this card are <strong>today's value<\u002Fstrong>; the year-by-year table projects them forward.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ asset.showCurrentLine }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:11px;padding-top:9px;border-top:1px dashed #e4ddcd;display:flex;justify-content:space-between;align-items:baseline\">\n                  <span style=\"font:500 11px 'Public Sans';color:#9a9484\">{{ asset.currentLabel }}<\u002Fspan>\n                  <span style=\"font:600 14px 'Lora',serif;color:{{ asset.color }};font-variant-numeric:tabular-nums\">{{ asset.currentValueFmt }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:15px\">\n          <span style=\"font:600 10px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#a8a290;display:block;margin-bottom:8px\">Add an asset<\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n            <button data-type=\"super\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ Super<\u002Fbutton>\n            <button data-type=\"db\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ UniSuper Defined Benefit<\u002Fbutton>\n            <button data-type=\"etf\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ Shares<\u002Fbutton>\n            <button data-type=\"cash\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ Cash<\u002Fbutton>\n            <button data-type=\"property\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ Property<\u002Fbutton>\n            <button data-type=\"home\" onclick=\"{{ onAddAsset }}\" style=\"border:1px solid #d9d3c6;background:#fff;color:#2a3340;cursor:pointer;font:600 12px 'Public Sans';padding:7px 11px;border-radius:7px\" style-hover=\"border-color:#15375c;background:#f4f7fb\">+ Home<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- RIGHT: DASHBOARD -->\n    <div class=\"wf-results\" style=\"display:flex;flex-direction:column;gap:20px\">\n\n      <div class=\"wf-kpi\" style=\"display:grid;grid-template-columns:{{ kpiCols }};gap:12px\">\n        <div style=\"grid-column:1 / -1;background:{{ readyBg }};border:1px solid {{ readyBorder }};border-radius:12px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font:700 18px 'Lora',serif;color:#1c2b3a\">{{ readyLabel }}<\u002Fdiv>\n            <div style=\"font:500 12px 'Public Sans';color:#5a6472;margin-top:2px\">{{ readySub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right\">\n            <div style=\"font:600 10px 'Public Sans';letter-spacing:.07em;text-transform:uppercase;color:#8a8576\">Bridge to preservation<\u002Fdiv>\n            <div style=\"font:600 15px 'Public Sans';color:#1c2b3a;margin-top:1px\">x = {{ bridgeYears }} yrs<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:{{ c1bg }};border:1px solid {{ c1bd }};border-radius:12px;padding:15px 16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:{{ c1c }}\">Investable Retirement Capital<\u002Fdiv><span style=\"font:700 14px 'Public Sans';color:{{ c1c }}\">{{ c1m }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font:600 18px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:5px;color:{{ c1c }}\">{{ c1v }}<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Public Sans';color:{{ c1c }};opacity:.85;margin-top:2px\">need ≥ {{ c1t }} (34×) · {{ c1d }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showBridge }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:{{ c2bg }};border:1px solid {{ c2bd }};border-radius:12px;padding:15px 16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:{{ c2c }}\">{{ c2title }}<\u002Fdiv><span style=\"font:700 14px 'Public Sans';color:{{ c2c }}\">{{ c2m }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font:600 18px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:5px;color:{{ c2c }}\">{{ c2v }}<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Public Sans';color:{{ c2c }};opacity:.85;margin-top:2px\">{{ c2sub }} · {{ c2d }}<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showCash }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:{{ c4bg }};border:1px solid {{ c4bd }};border-radius:12px;padding:15px 16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:{{ c4c }}\">{{ c4title }}<\u002Fdiv><span style=\"font:700 14px 'Public Sans';color:{{ c4c }}\">{{ c4m }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font:600 18px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:5px;color:{{ c4c }}\">{{ c4v }}<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Public Sans';color:{{ c4c }};opacity:.85;margin-top:2px\">{{ c4sub }} · {{ c4d }}<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"background:{{ c5bg }};border:1px solid {{ c5bd }};border-radius:12px;padding:15px 16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><div style=\"font:600 10px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;color:{{ c5c }}\">Investment Bucket<\u002Fdiv><span style=\"font:700 14px 'Public Sans';color:{{ c5c }}\">{{ c5m }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font:600 18px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:5px;color:{{ c5c }}\">{{ c5v }}<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Public Sans';color:{{ c5c }};opacity:.85;margin-top:2px\">need ≥ {{ c5t }} (27×) · {{ c5d }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font:400 11px 'Public Sans';color:#8a8576;line-height:1.5;margin-top:-2px\">\n        <div style=\"margin-bottom:7px\">You're <strong style=\"color:#1c2b3a;font-weight:600\">retirement-ready<\u002Fstrong> when both core checks pass <em>and<\u002Fem> you clear the bridge to preservation by either route below. Figures are shown at the age you first qualify (age {{ readyAge }}) and in <strong style=\"color:#1c2b3a;font-weight:600\">today's dollars<\u002Fstrong> — no inflation guesswork, so they line up directly with the targets.<\u002Fdiv>\n        <div class=\"wf-2col\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;margin-bottom:9px\">\n          <div><span style=\"color:#1c2b3a;font-weight:600\">① Big-enough nest egg<\u002Fspan> — Investable Retirement Capital (super + shares + cash, <em>not<\u002Fem> your home) ≥ <strong>34×<\u002Fstrong> a year's spending.<\u002Fdiv>\n          <div><span style=\"color:#1c2b3a;font-weight:600\">② Growth engine<\u002Fspan> — Investment Bucket (shares + super) ≥ <strong>27×<\u002Fstrong> spending.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:600 10px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#9a9484;margin-bottom:4px\">Plus bridge to preservation — pass <em>either<\u002Fem>:<\u002Fdiv>\n        <div class=\"wf-2col\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px 22px\">\n          <div><span style=\"color:#1c2b3a;font-weight:600\">③ⓐ Split<\u002Fspan> — shares ≥ <strong>27× · x/(x+40)<\u002Fstrong> <strong>and<\u002Fstrong> Cash Bucket (cash + refinance to 80% LVR) ≥ <strong>7×<\u002Fstrong>.<\u002Fdiv>\n          <div><span style=\"color:#1c2b3a;font-weight:600\">③ⓑ Bridge bucket<\u002Fspan> — shares + Cash Bucket ≥ <strong>(x + buffer)×<\u002Fstrong> spending, enough to cover the <em>x<\u002Fem> years until super unlocks plus a security buffer.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:6px;color:#a8a290\">x = years from this age to preservation age; buffer = your <em>Security buffer<\u002Fem> (extra years, set in Your Plan). After preservation (x = 0) the bridge clears automatically, so readiness is just ① + ②.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasTargetCmp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fbfaf6;border:1px solid #e4ddcd;border-radius:12px;padding:14px 16px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px\">\n          <div style=\"font:600 13px 'Public Sans';color:#1c2b3a\">At your target retirement age {{ retireAge }} <span style=\"font-weight:500;color:{{ tReadyColor }}\">— {{ tReadyLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font:500 11px 'Public Sans';color:#8a8576\">Capital vs 34× target: <strong style=\"color:{{ tReadyColor }};font-weight:600\">{{ tGapFmt }}<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-kpi\" style=\"display:grid;grid-template-columns:{{ tKpiCols }};gap:10px\">\n          <div style=\"background:#fff;border:1px solid #ece6da;border-radius:9px;padding:11px 12px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px\"><div style=\"font:600 9.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576\">Investable Retirement Capital<\u002Fdiv><span style=\"font:700 12px 'Public Sans';color:{{ t1c }}\">{{ t1m }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font:600 15px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:3px;color:{{ t1c }}\">{{ t1v }}<\u002Fdiv>\n            <div style=\"font:500 10px 'Public Sans';color:{{ t1c }};opacity:.8;margin-top:1px\">≥ {{ t1t }} · {{ t1d }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ tShowBridge }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fff;border:1px solid #ece6da;border-radius:9px;padding:11px 12px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px\"><div style=\"font:600 9.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576\">{{ t2title }}<\u002Fdiv><span style=\"font:700 12px 'Public Sans';color:{{ t2c }}\">{{ t2m }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font:600 15px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:3px;color:{{ t2c }}\">{{ t2v }}<\u002Fdiv>\n            <div style=\"font:500 10px 'Public Sans';color:{{ t2c }};opacity:.8;margin-top:1px\">≥ {{ t2t }} · {{ t2d }}<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tShowCash }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fff;border:1px solid #ece6da;border-radius:9px;padding:11px 12px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px\"><div style=\"font:600 9.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576\">{{ t4title }}<\u002Fdiv><span style=\"font:700 12px 'Public Sans';color:{{ t4c }}\">{{ t4m }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font:600 15px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:3px;color:{{ t4c }}\">{{ t4v }}<\u002Fdiv>\n            <div style=\"font:500 10px 'Public Sans';color:{{ t4c }};opacity:.8;margin-top:1px\">≥ {{ t4t }} ({{ t4mult }}) · {{ t4d }}<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"background:#fff;border:1px solid #ece6da;border-radius:9px;padding:11px 12px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px\"><div style=\"font:600 9.5px 'Public Sans';letter-spacing:.05em;text-transform:uppercase;color:#8a8576\">Investment Bucket<\u002Fdiv><span style=\"font:700 12px 'Public Sans';color:{{ t5c }}\">{{ t5m }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font:600 15px 'Lora',serif;font-variant-numeric:tabular-nums;margin-top:3px;color:{{ t5c }}\">{{ t5v }}<\u002Fdiv>\n            <div style=\"font:500 10px 'Public Sans';color:{{ t5c }};opacity:.8;margin-top:1px\">≥ {{ t5t }} · {{ t5d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div class=\"wf-no-print\" style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <button onclick=\"{{ onToggleToday }}\" style=\"border:1px solid #d9d3c6;background:{{ todayBg }};color:{{ todayColor }};cursor:pointer;font:600 12px 'Public Sans';padding:8px 14px;border-radius:999px\">{{ todayLabel }}<\u002Fbutton>\n        <span style=\"font:400 11px 'Public Sans';color:#a8a290\">toggle real vs nominal dollars<\u002Fspan>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <button onclick=\"{{ onPrint }}\" title=\"Opens your browser print dialog — choose Save as PDF. Every table expands fully in the PDF.\" style=\"border:1px solid #15375c;background:#15375c;color:#fff;cursor:pointer;font:600 12px 'Public Sans';padding:8px 14px;border-radius:8px\">Export PDF<\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ capWarn }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fdf4e3;border:1px solid #f0e0c0;border-radius:10px;padding:12px 15px;display:flex;gap:10px;align-items:flex-start\">\n          <span style=\"font:700 13px 'Public Sans';color:#b9822f;flex-shrink:0\">⚠ Cap exceeded<\u002Fspan>\n          <span style=\"font:400 12px 'Public Sans';color:#7a5a2f;line-height:1.5\">{{ capMsg }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 22px 18px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px\">\n          <div>\n            <h2 style=\"font:600 16px 'Lora',serif\">Wealth Trajectory<\u002Fh2>\n            <p style=\"font:400 12px 'Public Sans';color:#8a8576;margin-top:1px\">Stacked by category from age {{ currentAge }} to 100. Markers: <strong style=\"color:#15693f\">Retire<\u002Fstrong> (chosen retirement age) and <strong style=\"color:#8a8576\">Preservation<\u002Fstrong>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        {{ chart }}\n        <div style=\"display:flex;flex-wrap:wrap;gap:11px 16px;margin-top:12px\">\n          <span style=\"font:600 11px 'Public Sans';color:#8a8576;align-self:center\">Investable capital:<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#14365c\"><\u002Fspan><span style=\"font:500 12px 'Public Sans';color:#5a6472\">Super (Super + DB)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#3b82f6\"><\u002Fspan><span style=\"font:500 12px 'Public Sans';color:#5a6472\">Shares<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#7aa8e0\"><\u002Fspan><span style=\"font:500 12px 'Public Sans';color:#5a6472\">Cash<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#e0a458\"><\u002Fspan><span style=\"font:500 12px 'Public Sans';color:#5a6472\">Home equity (excl. from capital)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:16px;height:0;border-top:2px dashed #c0392b\"><\u002Fspan><span style=\"font:500 12px 'Public Sans';color:#5a6472\">Target (34× spending)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:11px 2px 2px;line-height:1.55\">From your retirement age to 100, balances are projected forward each year: <strong style=\"color:#5a6472\">SUPER &amp; SHARE<\u002Fstrong> grow untaxed at the index rate — tax is realized only on sale: <strong style=\"color:#5a6472\">shares<\u002Fstrong> incur CGT at your non-super rate on the gain when sold, and <strong style=\"color:#5a6472\">super<\u002Fstrong> above $3M incurs the extra 15% (Div 296) on realized gains after preservation age. <strong style=\"color:#5a6472\">HOME<\u002Fstrong> grows less loan repayments. <strong style=\"color:#5a6472\">SPENDING<\u002Fstrong> is your annual figure held constant in real terms (rising with inflation in future dollars) and paid from cash. <strong style=\"color:#5a6472\">CASH<\u002Fstrong> is topped up by shares if less than next year's spending before preservation age; topped up by SUPER after preservation age (no less than the ATO minimum pension drawdown), then by SHARES once super is exhausted. A guide only — not financial advice.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 22px 10px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <h2 style=\"font:600 16px 'Lora',serif;margin-bottom:12px\">Accumulation Forecast - Asset ({{ accRange }})<\u002Fh2>\n        <div class=\"wf-scroll\" style=\"max-height:340px;overflow:auto;border:1px solid #eee7d8;border-radius:8px\">\n          <sc-for list=\"{{ groupCols }}\" as=\"g\" hint-placeholder-count=\"4\">\n                  <\u002Fsc-for><sc-if value=\"{{ hasProp }}\" hint-placeholder-val=\"{{ false }}\">\n                  <\u002Fsc-if><sc-for list=\"{{ tableRows }}\" as=\"r\">\n                <\u002Fsc-for><sc-for list=\"{{ r.cells }}\" as=\"c\" hint-placeholder-count=\"4\">\n                    <\u002Fsc-for><sc-if value=\"{{ hasProp }}\" hint-placeholder-val=\"{{ false }}\">\n                    <\u002Fsc-if><table style=\"width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums\">\n            <thead>\n              <tr style=\"position:sticky;top:0;background:#0c2340;color:#fff;z-index:2\">\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom\">Age<\u002Fth>\n                <th style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom\">Year<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.05em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;color:{{ g.head }}\">{{ g.label }}<\u002Fth>\n                \n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;color:#9fd6c0;border-left:1px solid rgba(255,255,255,.14)\">Refi cash<br>@80% LVR<\u002Fth>\n                \n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;border-left:1px solid rgba(255,255,255,.14)\">Net worth<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;color:#9fd6c0\">Investment<br>Bucket<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;color:#9fd6c0\">Cash<br>Bucket<\u002Fth>\n                <th style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 11px;white-space:nowrap;vertical-align:bottom;color:#cbd6e4\">Investable Retirement&nbsp;Capital<br>excl. home<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"background:{{ r.bg }};border-bottom:1px solid #f0eadc\">\n                  <td style=\"text-align:left;font:600 12px 'Public Sans';padding:7px 11px;color:{{ r.ageColor }};white-space:nowrap\">{{ r.age }}{{ r.milestone }}<\u002Ftd>\n                  <td style=\"text-align:left;font:500 12px 'Public Sans';padding:7px 11px;color:#8a8576;white-space:nowrap\">{{ r.year }}<\u002Ftd>\n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 11px;color:{{ c.color }};white-space:nowrap\">{{ c.val }}<\u002Ftd>\n                  \n                  <td style=\"text-align:right;font:500 12px 'Public Sans';padding:7px 11px;color:#1f7a6e;white-space:nowrap;border-left:1px solid #eee7d8\">{{ r.refi }}<\u002Ftd>\n                  \n                  <td style=\"text-align:right;font:700 12px 'Public Sans';padding:7px 11px;color:#0c2340;white-space:nowrap;border-left:1px solid #eee7d8\">{{ r.net }}<\u002Ftd>\n                  <td style=\"text-align:right;font:600 12px 'Public Sans';padding:7px 11px;color:#1f7a6e;white-space:nowrap\">{{ r.liqPool }}<\u002Ftd>\n                  <td style=\"text-align:right;font:600 12px 'Public Sans';padding:7px 11px;color:#1f7a6e;white-space:nowrap\">{{ r.cashPool }}<span style=\"display:block;font:400 9.5px 'Public Sans';color:#b3ae9e;margin-top:1px\">{{ r.cashTargetCol }}<\u002Fspan><\u002Ftd>\n                  <td style=\"text-align:right;font:600 12px 'Public Sans';padding:7px 11px;color:#5a6472;white-space:nowrap\">{{ r.retCapExHome }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"font:400 11px 'Public Sans';color:#a8a290;margin:11px 2px 6px;line-height:1.6\">SUPER &amp; SHARE grow untaxed at the index rate — tax is realized only on sale. How each column is built:<br><strong>Super<\u002Fstrong> = all super balances incl. UniSuper Defined Benefit, each grown at its return plus contributions. &nbsp;<strong>Shares<\u002Fstrong> = ETF/share balances, grown plus contributions. &nbsp;<strong>Cash<\u002Fstrong> = cash &amp; term-deposit balances. &nbsp;<strong>Property<\u002Fstrong> = equity (value − loan) across investment property + home. &nbsp;<strong style=\"color:#1f7a6e\">Refi cash @80% LVR<\u002Fstrong> = 80% × home value − home loan (the cash you could draw out). &nbsp;<strong>Net worth<\u002Fstrong> = Super + Shares + Cash + Property equity. &nbsp;<strong style=\"color:#1f7a6e\">Investment Bucket<\u002Fstrong> = Shares + Super. &nbsp;<strong style=\"color:#1f7a6e\">Cash Bucket<\u002Fstrong> = Cash + 80%-LVR refi. &nbsp;<strong>Investable Retirement Capital (excl. home)<\u002Fstrong> = Shares + Cash + Super. &nbsp;The highlighted <strong style=\"color:#15375c\">◆<\u002Fstrong> retirement-age row is the Day-1 reallocation — your final accumulation snapshot at the chosen retirement age. A guide only — not financial advice.<\u002Fp>\n      <\u002Fsection>\n\n      <sc-if value=\"{{ hasSuper }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#fff;border:1px solid #e4ddcd;border-radius:12px;padding:20px 22px 10px;box-shadow:0 1px 2px rgba(20,40,70,.04)\">\n        <h2 style=\"font:600 16px 'Lora',serif;margin-bottom:3px\">Accumulation Forecast - SUPER ({{ accRange }})<\u002Fh2>\n        <p style=\"font:400 12px 'Public Sans';color:#8a8576;margin-bottom:12px\">Accumulation up to retirement age. Each super type as its own column-group — Super &amp; Defined Benefit. Within each: opening + contribution + return = closing.<\u002Fp>\n        <div class=\"wf-scroll\" style=\"max-height:340px;overflow:auto;border:1px solid #eee7d8;border-radius:8px\">\n          <sc-for list=\"{{ superGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <\u002Fsc-for><sc-for list=\"{{ superGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <\u002Fsc-for><sc-for list=\"{{ superFcBefore }}\" as=\"r\">\n                <\u002Fsc-for><sc-for list=\"{{ r.cells }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums\">\n            <thead>\n              <tr style=\"position:sticky;top:0;background:#0c2340;color:#fff;z-index:2\">\n                <th rowspan=\"2\" style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 12px;white-space:nowrap;vertical-align:bottom\">Age<\u002Fth>\n                <th rowspan=\"2\" style=\"text-align:left;font:600 10.5px 'Public Sans';letter-spacing:.02em;padding:8px 12px;white-space:nowrap;vertical-align:bottom\">Year<\u002Fth>\n                <th colspan=\"4\" style=\"text-align:center;font:600 9.5px 'Public Sans';letter-spacing:.06em;text-transform:uppercase;padding:6px 12px 3px;white-space:nowrap;color:#9fc0e8;border-left:1px solid rgba(255,255,255,.14)\">{{ g.name }}<\u002Fth>\n                \n                <th rowspan=\"2\" style=\"text-align:right;font:600 10.5px 'Public Sans';letter-spacing:.04em;text-transform:uppercase;padding:8px 14px;white-space:nowrap;vertical-align:bottom;color:#9fd6c0;border-left:1px solid rgba(255,255,255,.2)\">Total<\u002Fth>\n              <\u002Ftr>\n              <tr style=\"position:sticky;top:27px;background:#0c2340;color:#fff;z-index:2\">\n                <th style=\"text-align:right;font:600 10px 'Public Sans';padding:3px 12px 8px;white-space:nowrap;color:#cfddef;border-left:1px solid rgba(255,255,255,.14)\">Opening<\u002Fth>\n                  <th style=\"text-align:right;font:600 10px 'Public Sans';padding:3px 12px 8px;white-space:nowrap;color:#cfddef\">Contrib.<\u002Fth>\n                  <th style=\"text-align:right;font:600 10px 'Public Sans';padding:3px 12px 8px;white-space:nowrap;color:#cfddef\">Return<\u002Fth>\n                  <th style=\"text-align:right;font:600 10px
